{% block scripts %}
<script>
// Quantity buttons
document.querySelectorAll('.quantity-btn').forEach(button => {
    button.addEventListener('click', function() {
        const input = this.parentElement.querySelector('input');
        let value = parseInt(input.value);
        
        if(this.getAttribute('data-action') === 'increase') {
            input.value = value + 1;
        } else {
            if(value > 1) {
                input.value = value - 1;
            }
        }
    });
});

// Review stars
document.querySelectorAll('.review-star').forEach(star => {
    star.addEventListener('click', function() {
        const rating = parseInt(this.getAttribute('data-rating'));
        document.getElementById('rating-value').value = rating;
        
        // Update star display
        document.querySelectorAll('.review-star').forEach((s, index) => {
            if(index < rating) {
                s.classList.remove('far');
                s.classList.add('fas');
            } else {
                s.classList.remove('fas');
                s.classList.add('far');
            }
        });
    });
});

// Add to cart with quantity
document.querySelector('.add-to-cart').addEventListener('click', function() {
    const productId = this.getAttribute('data-product-id');
    const quantity = document.querySelector('input[type="number"]').value;
    const deliveryMethod = document.querySelector('input[name="delivery"]:checked').value;
    
    fetch(`/cart/add/${productId}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            quantity: quantity,
            delivery_method: deliveryMethod
        })
    })
    .then(response => response.json())
    .then(data => {
        if(data.success) {
            // Update cart count
            document.getElementById('cart-count').textContent = data.cart_count;
            // Show success message
            alert('Product added to cart!');
        }
    });
});

// Review form submission
document.getElementById('review-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    fetch("{% url 'products:add_review' product.id %}", {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if(data.success) {
            location.reload(); // Refresh to show new review
        }
    });
});
</script>
