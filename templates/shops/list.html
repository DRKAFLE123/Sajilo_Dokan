{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Local Shops</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for shop in shops %}
        <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
            <div class="h-48 overflow-hidden">
                <img src="{{ shop.logo.url }}" alt="{{ shop.name }}" class="w-full h-full object-cover">
            </div>
            <div class="p-6">
                <h2 class="text-xl font-semibold mb-2">{{ shop.name }}</h2>
                <p class="text-gray-600 mb-4">{{ shop.description|truncatechars:100 }}</p>
                <div class="flex justify-between items-center">
                    <span class="text-blue-600 font-medium">{{ shop.products.count }} products</span>
                    <a href="{% url 'shops:detail' shop.id %}" class="text-blue-600 hover:text-blue-800">View Shop →</a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-span-3 text-center py-12">
            <p class="text-gray-500">No shops available at the moment.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
