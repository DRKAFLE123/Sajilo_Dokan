{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <h1 class="text-2xl font-bold mb-6">
        {% if form.instance.pk %}Edit{% else %}Create{% endif %} Shop
    </h1>
    
    <form method="post" enctype="multipart/form-data" class="bg-white p-6 rounded-lg shadow-md">
        {% csrf_token %}
        
        <div class="space-y-4">
            {% for field in form %}
            <div>
                <label class="block text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="text-red-600 text-sm mt-1">{{ field.errors|join:", " }}</p>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        
        <div class="mt-6 flex justify-end space-x-3">
            <a href="{% url 'shops:dashboard' %}" class="px-4 py-2 border border-gray-300 rounded-md">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Save
            </button>
        </div>
    </form>
</div>
{% endblock %}
